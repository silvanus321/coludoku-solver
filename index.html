<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色獨封印法典 (全圖形版)</title>
    <style>
        /* --- 基礎設定 --- */
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { margin-bottom: 10px; color: #333; letter-spacing: 2px; }

        /* --- 控制面板 --- */
        .controls {
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .step-title {
            font-size: 1.1rem;
            color: #2c3e50;
            margin: 20px 0 10px 0;
            font-weight: bold;
            text-align: left;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        /* --- 等級選擇器 --- */
        .level-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            background: #eee;
            padding: 4px;
            border-radius: 8px;
        }

        .level-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 6px 0;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            color: #666;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .level-btn:hover { background-color: #ddd; color: #333; }
        .level-btn.active { background-color: #3498db; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* --- 圖片按鈕網格 --- */
        .grid-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .img-btn {
            background-color: white;
            border: 2px solid #eee;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            position: relative;
        }

        .img-btn:hover { border-color: #3498db; transform: translateY(-3px); }
        .img-btn.active { border-color: #f1c40f; background-color: #fffcf0; box-shadow: 0 0 8px rgba(241, 196, 15, 0.4); transform: scale(1.05); }
        .img-btn img { width: 85%; height: 85%; object-fit: contain; }
        
        .btn-label { margin-top: 5px; font-size: 0.75rem; color: #555; font-weight: bold; }
        #tile-buttons .img-btn.active { border-color: #e67e22; background-color: #fdf2e9; } 
        
        /* --- 執行按鈕與訊息 --- */
        .solve-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 25px;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.3);
            width: 100%;
        }
        .solve-btn:active { transform: scale(0.98); }
        .solve-btn:disabled { background-color: #95a5a6; cursor: not-allowed; box-shadow: none; }
        
        .status-msg { margin-top: 15px; font-weight: bold; min-height: 24px; font-size: 1.1rem; }
        .error-msg { color: #e74c3c; }
        .success-msg { color: #27ae60; }
        .multi-msg { color: #2980b9; }

        /* --- 九宮格 --- */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background-color: #333;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
        }

        .block {
            background-color: #fff;
            border: 3px solid transparent;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1 / 1; 
        }

        .block-image { width: 100%; height: 100%; object-fit: contain; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .block-info {
            position: absolute; bottom: 2px; right: 2px;
            background: rgba(0,0,0,0.6); color: white;
            padding: 1px 4px; border-radius: 3px;
            font-size: 0.7rem; pointer-events: none;
            white-space: nowrap;
        }
        .empty-slot { background-color: #e0e0e0; color: #bbb; font-size: 1.5rem; }

    </style>
</head>
<body>

    <h1>🔮 色獨封印法典</h1>
    
    <div class="controls">
        
        <div class="step-title">步驟 1：選擇魔石組合 (Tiles) 💎</div>
        
        <div class="level-selector" id="tile-level-buttons">
            <button class="level-btn" onclick="filterTilesByLevel(7)">Level VII</button>
            <button class="level-btn" onclick="filterTilesByLevel(8)">VIII</button>
            <button class="level-btn" onclick="filterTilesByLevel(9)">IX</button>
            <button class="level-btn" onclick="filterTilesByLevel(10)">X</button>
            <button class="level-btn" onclick="filterTilesByLevel(11)">XI</button>
            <button class="level-btn" onclick="filterTilesByLevel(12)">XII</button>
        </div>

        <div class="grid-selector" id="tile-buttons"></div>

        <div class="step-title">步驟 2：選擇封印法陣 (Shapes) 🔯</div>
        
        <div class="level-selector" id="shape-level-buttons">
            <button class="level-btn" onclick="filterShapesByLevel(7)">Level VII</button>
            <button class="level-btn" onclick="filterShapesByLevel(8)">VIII</button>
            <button class="level-btn" onclick="filterShapesByLevel(9)">IX</button>
            <button class="level-btn" onclick="filterShapesByLevel(10)">X</button>
            <button class="level-btn" onclick="filterShapesByLevel(11)">XI</button>
            <button class="level-btn" onclick="filterShapesByLevel(12)">XII</button>
        </div>

        <div class="grid-selector" id="shape-buttons"></div>

        <div class="step-title">步驟 3：詠唱咒語 🪄</div>
        
        <div style="margin-bottom: 15px; font-size: 0.95rem; color: #444; text-align: left; padding-left: 10px;">
            <input type="checkbox" id="lock-rotation" checked onchange="resetSolverState()">
            <label for="lock-rotation" style="cursor: pointer; font-weight: bold;">🔒 鎖定初始魔石方向</label>
        </div>

        <div id="status-text" class="status-msg">請完成設定...</div>
        <button id="btn-solve" class="solve-btn" onclick="startSolving()">✨ 開始封印 ✨</button>
    </div>

    <div id="grid-container" class="main-grid"></div>

    <script>
        // --- 1. 資料庫：基本方塊定義 ---
        const BLOCKS = {
            1: { B: [[1,2],[3,4]], W: [[4,3],[6,5]] },
            2: { B: [[3,4],[5,6]], W: [[6,5],[2,1]] },
            3: { B: [[5,6],[1,2]], W: [[2,1],[4,3]] },
            4: { B: [[2,3],[5,6]], W: [[5,4],[2,1]] },
            5: { B: [[4,5],[1,2]], W: [[1,6],[4,3]] },
            6: { B: [[6,1],[3,4]], W: [[3,2],[6,5]] },
            7: { B: [[4,5],[6,1]], W: [[1,6],[3,2]] },
            8: { B: [[6,1],[2,3]], W: [[3,2],[5,4]] },
            9: { B: [[2,3],[4,5]], W: [[5,4],[1,6]] }
        };

        // --- 資料庫：魔石組合 (Target Tiles) ---
        const TARGET_TILES = [
            // Level 7
            { id: 1,  level: 7, blocks: [{id:1, f:'B'}, {id:4, f:'W'}] },
            { id: 2,  level: 7, blocks: [{id:2, f:'B'}, {id:5, f:'W'}] },
            { id: 3,  level: 7, blocks: [{id:3, f:'B'}, {id:6, f:'W'}] },

            { id: 5,  level: 7, blocks: [{id:2, f:'W'}, {id:4, f:'B'}] },

            // Level 8

            { id: 12, level: 8, blocks: [{id:3, f:'W'}, {id:6, f:'B'}] },

            // Level 9
            { id: 13, level: 9, blocks: [{id:1, f:'B'}, {id:8, f:'W'}] },
            { id: 14, level: 9, blocks: [{id:2, f:'B'}, {id:9, f:'W'}] },

            { id: 16, level: 9, blocks: [{id:1, f:'W'}, {id:7, f:'B'}] },
            { id: 17, level: 9, blocks: [{id:2, f:'W'}, {id:8, f:'B'}] },
            { id: 18, level: 9, blocks: [{id:3, f:'W'}, {id:9, f:'B'}] },

            // Level 10
            { id: 19, level: 10, blocks: [{id:4, f:'B'}, {id:7, f:'W'}] },
            { id: 20, level: 10, blocks: [{id:5, f:'B'}, {id:8, f:'W'}] },
            { id: 21, level: 10, blocks: [{id:6, f:'B'}, {id:9, f:'W'}] },
            { id: 22, level: 10, blocks: [{id:4, f:'W'}, {id:9, f:'B'}] },
            { id: 23, level: 10, blocks: [{id:5, f:'W'}, {id:7, f:'B'}] },
            { id: 24, level: 10, blocks: [{id:6, f:'W'}, {id:8, f:'B'}] },

            // Level 11
            { id: 25, level: 11, blocks: [{id:4, f:'B'}, {id:1, f:'W'}] },
            { id: 26, level: 11, blocks: [{id:5, f:'B'}, {id:2, f:'W'}] },
            { id: 27, level: 11, blocks: [{id:6, f:'B'}, {id:3, f:'W'}] },
            { id: 28, level: 11, blocks: [{id:7, f:'W'}, {id:1, f:'B'}] },
            { id: 29, level: 11, blocks: [{id:8, f:'W'}, {id:2, f:'B'}] },
            { id: 30, level: 11, blocks: [{id:9, f:'W'}, {id:3, f:'B'}] },

            // Level 12
            { id: 31, level: 12, blocks: [{id:7, f:'B'}, {id:1, f:'W'}] },
            { id: 32, level: 12, blocks: [{id:8, f:'B'}, {id:2, f:'W'}] },
            { id: 33, level: 12, blocks: [{id:9, f:'B'}, {id:3, f:'W'}] },
            { id: 34, level: 12, blocks: [{id:4, f:'W'}, {id:7, f:'B'}] },
            { id: 35, level: 12, blocks: [{id:5, f:'W'}, {id:8, f:'B'}] },
            { id: 36, level: 12, blocks: [{id:6, f:'W'}, {id:9, f:'B'}] } 
        ];

        // --- 資料庫：封印法陣 (Shapes) 更新版 ---
        const SHAPES = [
            // Level 7
            { id: 1, name: "No.01", level: 7, active: [1,2,5,8], targets: [1,5] },
            { id: 2, name: "No.02", level: 7, active: [2,4,5,6], targets: [2,6] },
            { id: 3, name: "No.03", level: 7, active: [3,7,8,9], targets: [3,7] },
            { id: 4, name: "No.04", level: 7, active: [1,2,5,8], targets: [1,8] },
            { id: 5, name: "No.05", level: 7, active: [2,4,5,6], targets: [2,4] },
            { id: 6, name: "No.06", level: 7, active: [3,7,8,9], targets: [3,8] },
            // Level 8
            { id: 7, name: "No.07", level: 8, active: [1,2,4,5], targets: [1,5] },
            { id: 8, name: "No.08", level: 8, active: [1,3,7,9], targets: [3,7] },
            { id: 9, name: "No.09", level: 8, active: [4,6,7,9], targets: [4,9] },
            { id: 10, name: "No.10", level: 8, active: [1,2,4,5], targets: [2,4] },
            { id: 11, name: "No.11", level: 8, active: [1,3,7,9], targets: [1,9] },
            { id: 12, name: "No.12", level: 8, active: [4,6,7,9], targets: [6,7] },
            // Level 9
            { id: 13, name: "No.13", level: 9, active: [3,4,5,6,7], targets: [5,7] },
            { id: 14, name: "No.14", level: 9, active: [2,4,7,8,9], targets: [4,8] },
            { id: 15, name: "No.15", level: 9, active: [1,5,7,8,9], targets: [5,9] },
            { id: 16, name: "No.16", level: 9, active: [3,4,5,6,7], targets: [3,4] },
            { id: 17, name: "No.17", level: 9, active: [2,4,7,8,9], targets: [4,9] },
            { id: 18, name: "No.18", level: 9, active: [1,5,7,8,9], targets: [1,9] },
            // Level 10
            { id: 19, name: "No.19", level: 10, active: [2,4,6,7,8,9], targets: [6,8] },
            { id: 20, name: "No.20", level: 10, active: [2,4,5,6,7,9], targets: [5,9] },
            { id: 21, name: "No.21", level: 10, active: [1,3,5,7,8,9], targets: [5,9] },
            { id: 22, name: "No.22", level: 10, active: [2,4,6,7,8,9], targets: [6,7] },
            { id: 23, name: "No.23", level: 10, active: [2,4,5,6,7,9], targets: [4,9] },
            { id: 24, name: "No.24", level: 10, active: [1,3,5,7,8,9], targets: [1,9] },
            // Level 11
            { id: 25, name: "No.25", level: 11, active: [2,4,5,6,8], targets: [2,4] },
            { id: 26, name: "No.26", level: 11, active: [1,4,7,8,9], targets: [4,8] },
            { id: 27, name: "No.27", level: 11, active: [3,4,5,6,9], targets: [3,5] },
            { id: 28, name: "No.28", level: 11, active: [2,4,5,6,8], targets: [6,8] },
            { id: 29, name: "No.29", level: 11, active: [1,4,7,8,9], targets: [1,8] },
            { id: 30, name: "No.30", level: 11, active: [3,4,5,6,9], targets: [3,4] },
            // Level 12
            { id: 31, name: "No.31", level: 12, active: [1,2,4,5,7,8], targets: [2,4] },
            { id: 32, name: "No.32", level: 12, active: [1,2,3,7,8,9], targets: [1,8] },
            { id: 33, name: "No.33", level: 12, active: [4,5,6,7,8,9], targets: [6,8] },
            { id: 34, name: "No.34", level: 12, active: [1,2,4,5,7,8], targets: [1,8] },
            { id: 35, name: "No.35", level: 12, active: [1,2,3,7,8,9], targets: [1,9] },
            { id: 36, name: "No.36", level: 12, active: [4,5,6,7,8,9], targets: [6,7] }
        ];

        // 全域變數
        let currentTileID = 1;  
        let currentShapeID = 1; 
        
        let currentLayoutConfig = {}; 
        let reservedIDs = new Set();
        let allSolutions = [];      
        let currentSolIndex = 0;    
        let lastParamsHash = "";    

        // --- 初始化 ---
        function init() {
            // 預設載入 Level 7
            filterTilesByLevel(7);
            filterShapesByLevel(7);
            
            // 預設選中
            selectTile(1);
            selectShape(1);
        }

        // --- 核心邏輯：過濾器 ---
        
        function filterTilesByLevel(level) {
            updateLevelBtns('tile-level-buttons', level);
            
            const btnContainer = document.getElementById('tile-buttons');
            btnContainer.innerHTML = '';

            const levelTiles = TARGET_TILES.filter(t => t.level === level);
            
            levelTiles.forEach((tile) => {
                const btn = document.createElement('div');
                btn.className = 'img-btn';
                if(tile.id === currentTileID) btn.classList.add('active');

                btn.onclick = () => selectTile(tile.id);
                
                const paddedID = String(tile.id).padStart(2, '0');
                const imgPath = `images/tile-${paddedID}.png`;
                const label = `No.${paddedID}`;
                
                btn.innerHTML = `
                    <img src="${imgPath}" alt="${label}" onerror="this.style.display='none';this.parentElement.innerText='${label}'">
                    <div class="btn-label">${label}</div>
                `;
                btnContainer.appendChild(btn);
            });
            
            if (levelTiles.length > 0 && !levelTiles.some(t => t.id === currentTileID)) {
                selectTile(levelTiles[0].id);
            }
        }

        function filterShapesByLevel(level) {
            updateLevelBtns('shape-level-buttons', level);

            const btnContainer = document.getElementById('shape-buttons');
            btnContainer.innerHTML = ''; 

            const levelShapes = SHAPES.filter(s => s.level === level);
            
            levelShapes.forEach((shape) => {
                const btn = document.createElement('div');
                btn.className = 'img-btn';
                if(shape.id === currentShapeID) btn.classList.add('active');

                btn.onclick = () => selectShape(shape.id);
                
                const paddedID = String(shape.id).padStart(2, '0');
                const imgPath = `images/shape-${paddedID}.png`;
                
                btn.innerHTML = `
                    <img src="${imgPath}" alt="${shape.name}" onerror="this.style.display='none';this.parentElement.innerText='${shape.name}'">
                    <div class="btn-label">${shape.name}</div>
                `;
                btnContainer.appendChild(btn);
            });
            
            if (levelShapes.length > 0 && !levelShapes.some(s => s.id === currentShapeID)) {
                selectShape(levelShapes[0].id);
            }
        }

        function updateLevelBtns(containerId, activeLevel) {
            const btns = document.getElementById(containerId).querySelectorAll('.level-btn');
            btns.forEach((btn, idx) => {
                // 等級 7-12，索引 0-5
                if (idx + 7 === activeLevel) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function selectTile(id) {
            currentTileID = id;
            updateActiveState('tile-buttons', id);
            resetSolverState();
            updatePreview();
        }

        function selectShape(id) {
            currentShapeID = id;
            updateActiveState('shape-buttons', id);
            resetSolverState();
            updatePreview();
        }

        function updateActiveState(containerId, activeId) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.img-btn').forEach(b => b.classList.remove('active'));
            
            const paddedId = String(activeId).padStart(2, '0');
            const targetText = `No.${paddedId}`;
            const targetName = SHAPES.find(s=>s.id===activeId)?.name || `No.${paddedId}`;

            container.querySelectorAll('.img-btn').forEach(btn => {
                if(btn.innerText.includes(targetText) || btn.innerText.includes(targetName)) {
                    btn.classList.add('active');
                }
            });
        }
        
        function resetSolverState() {
            allSolutions = [];
            currentSolIndex = 0;
            renderEmptyGrid();
            document.getElementById('btn-solve').innerText = "✨ 開始封印 ✨";
            document.getElementById('status-text').innerHTML = "準備就緒";
        }

        function updatePreview() {
            const shape = SHAPES.find(s => s.id === currentShapeID);
            const tile = TARGET_TILES.find(t => t.id === currentTileID);
            
            if(!shape || !tile) return;

            currentLayoutConfig = {};
            for(let i=0; i<9; i++) currentLayoutConfig[i] = { type: 'EMPTY' };
            shape.active.forEach(pos => { currentLayoutConfig[pos-1] = { type: 'SOLVE' }; });
            
            shape.targets.forEach((pos, idx) => {
                if (idx < tile.blocks.length) {
                    const blockDef = tile.blocks[idx];
                    currentLayoutConfig[pos-1] = { 
                        type: 'FIXED', 
                        id: blockDef.id, 
                        face: blockDef.f 
                    };
                } else {
                    currentLayoutConfig[pos-1] = { type: 'SOLVE' };
                }
            });
            
            renderGrid(null, true);
        }

        // --- 解題核心 ---
        function getRotatedMatrix(matrix, times) {
            let m = JSON.parse(JSON.stringify(matrix));
            for (let t = 0; t < times; t++) {
                const newM = [[0,0],[0,0]];
                newM[0][1] = m[0][0]; newM[1][1] = m[0][1];
                newM[1][0] = m[1][1]; newM[0][0] = m[1][0];
                m = newM;
            }
            return m;
        }

        function isValid(boardState) {
            let fullGrid = Array(6).fill().map(() => Array(6).fill(0));
            for(let i=0; i<9; i++) {
                if(!boardState[i]) continue;
                let b = boardState[i];
                let baseRow = Math.floor(i / 3) * 2;
                let baseCol = (i % 3) * 2;
                let matrix = getRotatedMatrix(BLOCKS[b.id][b.face], b.rot);
                fullGrid[baseRow][baseCol] = matrix[0][0]; fullGrid[baseRow][baseCol+1] = matrix[0][1];
                fullGrid[baseRow+1][baseCol] = matrix[1][0]; fullGrid[baseRow+1][baseCol+1] = matrix[1][1];
            }
            for (let i = 0; i < 6; i++) {
                let rowSeen = new Set(), colSeen = new Set();
                for (let j = 0; j < 6; j++) {
                    let rVal = fullGrid[i][j];
                    if (rVal !== 0) { if (rowSeen.has(rVal)) return false; rowSeen.add(rVal); }
                    let cVal = fullGrid[j][i];
                    if (cVal !== 0) { if (colSeen.has(cVal)) return false; colSeen.add(cVal); }
                }
            }
            return true;
        }

        function solveAll(board, usedIDs) {
            // 這裡改成 288！
            if (allSolutions.length >= 288) return true;

            let slot = -1;
            for(let i=0; i<9; i++) {
                if (!currentLayoutConfig[i]) continue;
                const type = currentLayoutConfig[i].type;
                if(board[i] === null && (type === 'SOLVE' || type === 'FIXED')) {
                    slot = i; break;
                }
            }

            if (slot === -1) {
                allSolutions.push(JSON.parse(JSON.stringify(board)));
                return false; 
            }

            const config = currentLayoutConfig[slot];
            let candidates = [];

            if (config.type === 'FIXED') {
                candidates.push({ id: config.id, face: config.face, isFixed: true });
            } else {
                for (let id = 1; id <= 9; id++) {
                    if (!usedIDs.has(id) && !reservedIDs.has(id)) {
                        candidates.push({ id: id, face: 'B', isFixed: false });
                        candidates.push({ id: id, face: 'W', isFixed: false });
                    }
                }
            }

            // 取得目前的鎖定狀態
            const lockRotation = document.getElementById('lock-rotation').checked;

            for (let cand of candidates) {
                // 如果勾選鎖定，且這是被固定的初始魔石，就只測試 0 度；否則測試 4 個方向
                let rotationsToTest = (cand.isFixed && lockRotation) ? [0] : [0, 1, 2, 3];
                
                for (let rot of rotationsToTest) {
                    board[slot] = { id: cand.id, face: cand.face, rot: rot, isFixed: cand.isFixed };
                    
                    if (isValid(board)) {
                        usedIDs.add(cand.id);
                        if (solveAll(board, usedIDs)) return true; 
                        usedIDs.delete(cand.id);
                    }
                    board[slot] = null;
                }
            }
            return false;
        }

        // --- 執行與渲染 ---
        function startSolving() {
            // 把鎖定狀態加入快取判定中，這樣改變打勾狀態時才會重新計算
            const isLocked = document.getElementById('lock-rotation').checked;
            const currentParamsHash = `${currentTileID}-${currentShapeID}-${isLocked}`;

            if (currentParamsHash !== lastParamsHash || allSolutions.length === 0) {
                document.getElementById('status-text').innerHTML = "🔮 正在詠唱咒語...";
                
                let board = Array(9).fill(null);
                let used = new Set();
                reservedIDs.clear();
                allSolutions = []; 

                if (Object.keys(currentLayoutConfig).length === 0) {
                     alert("請先選擇圖形與魔石！");
                     return;
                }

                for(let i=0; i<9; i++) {
                    const config = currentLayoutConfig[i];
                    if(config && config.type === 'FIXED') {
                        reservedIDs.add(config.id);
                    }
                }

                setTimeout(() => {
                    solveAll(board, used); 

                    if (allSolutions.length > 0) {
                        currentSolIndex = 0;
                        lastParamsHash = currentParamsHash; 
                        updateStatusAndRender();
                    } else {
                        document.getElementById('status-text').innerHTML = "<span class='error-msg'>❌ 封印失敗 (魔力衝突)</span>";
                        document.getElementById('btn-solve').innerText = "✨ 開始封印 ✨";
                    }
                }, 50);

            } else {
                currentSolIndex++;
                if (currentSolIndex >= allSolutions.length) {
                    currentSolIndex = 0; 
                }
                updateStatusAndRender();
            }
        }

        function updateStatusAndRender() {
            const total = allSolutions.length;
            const current = currentSolIndex + 1;
            const btn = document.getElementById('btn-solve');
            const status = document.getElementById('status-text');

            renderGrid(allSolutions[currentSolIndex], false);

            if (total === 1) {
                status.innerHTML = "<span class='success-msg'>✅ 封印成功 (唯一解)</span>";
                btn.innerText = "✨ 唯一解 ✨";
            } else {
                // 這裡也改成 288！
                let countText = total >= 288 ? "288+" : total;
                status.innerHTML = `<span class='multi-msg'>✅ 封印成功 (第 ${current} / ${countText} 種解法)</span>`;
                btn.innerText = "➡️ 換一種解法";
            }
        }

        function renderEmptyGrid() {
            renderGrid(null, true);
        }

        function renderGrid(boardData, isPreview) {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            const isLocked = document.getElementById('lock-rotation').checked;

            for(let i=0; i<9; i++) {
                const config = currentLayoutConfig[i];
                let block = boardData ? boardData[i] : null;
                const div = document.createElement('div');
                div.className = 'block';

                if (isPreview && config && config.type === 'FIXED') {
                    block = { id: config.id, face: config.face, rot: 0, isFixed: true };
                }

                if (config && config.type === 'EMPTY') {
                    div.classList.add('empty-slot');
                } 
                else if (block) {
                    div.style.borderColor = block.isFixed ? '#e74c3c' : '#555';
                    
                    // 根據新的檔名規則載入圖片
                    const paddedBlockId = String(block.id).padStart(2, '0');
                    const imagePath = `images/block_${block.face}-${paddedBlockId}.png`;
                    const rot = block.rot * 90;
                    
                    // 鎖定狀態的視覺小圖示
                    const lockIcon = (block.isFixed && isLocked) ? '🔒' : '';
                    
                    div.innerHTML = `
                        <img src="${imagePath}" class="block-image" style="transform: rotate(${rot}deg);"
                             onerror="this.style.display='none'; this.parentNode.innerText='${block.face}${block.id}';">
                        <div class="block-info">${block.face}${block.id} ${lockIcon}</div>
                    `;
                }
                else if (config && config.type === 'SOLVE') {
                    div.innerHTML = '<span style="color:#ccc; font-size:2rem;">?</span>';
                }
                container.appendChild(div);
            }
        }

        init();
    </script>
</body>
